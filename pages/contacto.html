<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Mi Primer Pagina</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="#">Inicio</a>
          </li>
          <li>
            <a href="sobre-mi.html">Sobre mí</a>
          </li>
          <li>
            <a href="proyectos.html">Proyectos</a>
          </li>
          <li>
            <a href="servicios.html">Servicios</a>
          </li>
          <li>
            <a class="active" href="/pages/contacto.html">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="hero-contactos">
        <div class="hero-text">
          <h1>Contactanos</h1>
          <p>
            I transform research insights into intuitive digital experiences,
            helping teams build products that are useful, usable, and
            meaningful."
          </p>
        </div>
      </section>
      <section id="form">
        <form>
          <div class="input-group">
            <label for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Tu nombre"
              required
            />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@email.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="mensaje">Mensaje</label>
            <textarea
              id="mensaje"
              name="mensaje"
              rows="5"
              placeholder="Contame sobre tu proyecto..."
              required
            ></textarea>
          </div>

          <button class="button-primary">Enviar</button>
        </form>
      </section>
    </main>
    <footer>
      <div id="footer-logo-container">
        <img height="40px" id="logo" src="../logo.png" alt="logo" />
        <p>&copy; 2026 - Todos los derechos reservados.</p>
      </div>
      <ul>
        <li>
          <a href="www.instagram.com"
            ><img id="instagram" src="../instagram.svg" alt="instagram"
          /></a>
        </li>
        <li>
          <a href="www.github.com"
            ><img id="github" src="../github.svg" alt="github"
          /></a>
        </li>
      </ul>
    </footer>
  </body>
</html>
