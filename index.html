<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Mi Primer Pagina</title>
  </head>
  <body>
    <main>
      <header>
        <div class="text-container">
          <h1>Profile</h1>
          <p>View all your profile details here.</p>
        </div>
        <nav>
          <ul>
            <li>
              <a href="#instagram"
                ><img src="./instagram.svg" alt="instagram"
              /></a>
            </li>
            <li>
              <a href="#github"><img src="./github.svg" alt="github" /></a>
            </li>
          </ul>
        </nav>
      </header>
      <section id="profile-information">
        <div id="profile-picture">
          <div class="text-container">
            <h2>Ana Clara Alleva</h2>
            <p>UX UI Designer</p>
          </div>
          <figure>
            <img
              class="profile-img"
              src="./alleva-ana.png"
              alt="profile-picture"
            />
            <figcaption>My profile picture</figcaption>
          </figure>
        </div>
        <div id="bio-container">
          <h3>Bio & Other Details</h3>
          <article class="info">
            <div>
              <h4>My Role</h4>
              <p>UX UI Designer</p>
            </div>
            <div>
              <h4>My Experience</h4>
              <p>Senior</p>
            </div>
          </article>
          <article class="info">
            <div>
              <h4>My Email</h4>
              <p>aclara@gmail.com</p>
            </div>
            <div>
              <h4>My Portfolio</h4>
              <a href="#">Behance.com/profile</a>
            </div>
          </article>
          <article class="info">
            <div>
              <h4>My City</h4>
              <p>Buenos Aires</p>
            </div>
            <div>
              <h4>Availability</h4>
              <p class="pill">Ready</p>
            </div>
          </article>
        </div>
      </section>
      <footer>
        <p>&copy; 2026 - Todos los derechos reservados.</p>
      </footer>
    </main>
  </body>
</html>
